<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    .wrap {
      width: 100%;
      height: 100%;
      background: #f5ebe6;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .badge {
      background: #e8cfc7;
      border-radius: 8px;
      padding: 6px 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #7a4a3e;
    }
    .number {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #7a4a3e;
      letter-spacing: -0.04em;
    }
    .unit {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #b08a80;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="badge">⚓ 오늘 함께 항해한 학우는?</span>
    <div style="display:flex; align-items:baseline; gap:4px;">
      <span class="number" id="count">...</span>
      <span class="unit">명</span>
    </div>
  </div>

  <script>
    const NAMESPACE = 'doxxeon-notion';
    const KEY = '35202e228249808495fbdcff45bc8278';

    fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/${KEY}/up`)
      .then(r => r.json())
      .then(data => {
        document.getElementById('count').textContent = data.count.toLocaleString();
      })
      .catch(() => {
        document.getElementById('count').textContent = '-';
      });
  </script>
</body>
</html>
